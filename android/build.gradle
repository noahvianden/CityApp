// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

subprojects { subproject ->
    if (subproject.name == 'capacitor-filesystem') {
        subproject.tasks.configureEach { task ->
            if (task.name.toLowerCase().contains('kotlin') && task.hasProperty('kotlinOptions')) {
                // The warnings come from Capacitor's vendored filesystem plugin source in node_modules,
                // not from CityApp. Keep the suppression scoped to that dependency project only.
                task.kotlinOptions.suppressWarnings = true
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
